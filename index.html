<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PBK Warehouse Management v18.3</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Recharts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.min.js"></script>

  <!-- Lucide React (UMD) -->
  <script src="https://unpkg.com/lucide-react@0.263.1/dist/umd/lucide-react.js"></script>

  <!-- Three.js (3D 뷰용) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0f1a; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #0a0f1a; z-index: 9999;
      gap: 16px;
    }
    .spinner {
      width: 52px; height: 52px; border: 4px solid #1e293b;
      border-top-color: #3b82f6; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading .title { color: #93c5fd; font-size: 18px; font-weight: 700; letter-spacing: 0.05em; }
    #loading .sub { color: #475569; font-size: 13px; }
    #error {
      display: none; position: fixed; inset: 0; background: #0a0f1a;
      align-items: center; justify-content: center; flex-direction: column; gap: 12px;
      color: #f87171; font-size: 14px; z-index: 9999;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div class="title">🏭 PBK Warehouse Management</div>
    <div class="sub">Loading v18.3...</div>
  </div>
  <div id="error">
    <div style="font-size:24px">⚠️</div>
    <div id="error-msg">로딩 오류가 발생했습니다.</div>
    <div style="color:#64748b;font-size:12px">콘솔(F12)에서 오류 상세 확인</div>
  </div>
  <div id="root"></div>

  <script>
    // 전역 네임스페이스 설정
    window.LucideReact = window.LucideReact || lucide || {};
    window.Recharts = window.Recharts || {};
    window.THREE = window.THREE || THREE;

    // Recharts 전역 노출
    if (window.Recharts && typeof window.Recharts === 'object') {
      // 이미 설정됨
    }
  </script>

  <!-- 앱 메인 코드 -->
  <script src="app.js"></script>

  <script>
    // React 앱 마운트
    (function() {
      try {
        const AppComponent = window.App || window.PBKWarehouseSystem;
        if (!AppComponent) {
          throw new Error('App 컴포넌트를 찾을 수 없습니다. app.js가 정상 로드되었는지 확인하세요.');
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(React.createElement(AppComponent));

        document.getElementById('loading').style.display = 'none';
      } catch(e) {
        console.error('Mount error:', e);
        document.getElementById('loading').style.display = 'none';
        const errEl = document.getElementById('error');
        errEl.style.display = 'flex';
        document.getElementById('error-msg').textContent = e.message;
      }
    })();
  </script>
</body>
</html>
