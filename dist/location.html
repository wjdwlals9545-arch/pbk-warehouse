<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PBK 자재 위치 검색</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f1f5f9;min-height:100vh;color:#1e293b}
.hd{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hd h1{font-size:18px;font-weight:700}.hd p{font-size:12px;color:#c7d2fe;margin-top:2px}
.sw{padding:14px 14px 8px;background:#fff;border-bottom:1px solid #e2e8f0}
.sr{display:flex;gap:8px;position:relative}
.si{flex:1;padding:11px 14px;border:2px solid #e2e8f0;border-radius:10px;font-size:15px;outline:none}
.si:focus{border-color:#6366f1}
.sbtn{padding:11px 18px;background:#f59e0b;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.sbtn:hover{background:#d97706}
.acd{position:absolute;left:0;right:0;top:100%;background:#fff;border:1px solid #e2e8f0;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:200;max-height:240px;overflow-y:auto;margin-top:4px;display:none}
.ai{padding:10px 14px;cursor:pointer;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:10px}
.ai:hover{background:#eef2ff}.ai:last-child{border:none}
.am{font-family:monospace;font-weight:700;font-size:13px;flex-shrink:0}
.ad{font-size:12px;color:#64748b;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ab{font-size:11px;color:#6366f1;font-weight:600;flex-shrink:0}
.ct{padding:14px}
.card{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;margin-bottom:12px}
.ch{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f1f5f9}
.bdg{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;color:#fff}
.b48{background:#ef4444}.b16{background:#3b82f6}.bh{background:#f97316}.be{background:#64748b}
.ct2{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}
.cs{font-size:12px;color:#94a3b8;margin-left:4px}
.ccnt{font-size:13px;color:#6366f1;font-weight:600}
.cb{padding:12px 14px}
.rr{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
@media(max-width:600px){.rr{flex-direction:column}.mc{width:100%;align-items:center}.ic{width:100%}}
.ic{flex:1;min-width:0}
.ip{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;margin-bottom:4px}
.im{font-family:monospace;font-weight:700;font-size:12px;flex-shrink:0}
.id2{font-size:12px;color:#64748b;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.iq{font-weight:700;font-size:12px;color:#4f46e5;flex-shrink:0}
.mc{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:160px}
.sb2{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.stag{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.mt{font-size:11px;color:#94a3b8;padding:2px 6px}
.eb{background:#fff;border-radius:14px;padding:36px 20px;text-align:center}
.hc{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:12px}
.hchip{padding:6px 12px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;cursor:pointer;color:#475569}
.hchip:hover{background:#e0e7ff;color:#4f46e5}
.bk{display:inline-flex;align-items:center;padding:8px 14px;background:#f1f5f9;border-radius:8px;font-size:13px;font-weight:600;color:#475569;cursor:pointer;margin-bottom:12px;border:1px solid #e2e8f0}
.bk:hover{background:#e0e7ff;color:#4f46e5}
.tw{border-radius:10px;overflow:hidden;border:1px solid #e2e8f0;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f8fafc;padding:8px 10px;text-align:left;font-weight:600;color:#64748b;border-bottom:1px solid #e2e8f0}
td{padding:7px 10px;border-bottom:1px solid #f1f5f9}
tr:last-child td{border:none}
tr:hover td{background:#f8f9ff}
@keyframes spin{to{transform:rotate(360deg)}}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px}
#loading .spin{width:44px;height:44px;border:4px solid #e0e7ff;border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite}
#loading p{color:#6366f1;font-weight:600;font-size:14px}
#error{display:none;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;text-align:center}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div class="hd">
  <h1>&#128205; 자재 위치 검색</h1>
  <p id="hd-date">PBK Warehouse &#183; 데이터 로드 중...</p>
</div>
<div class="sw">
  <div class="sr">
    <div style="flex:1;position:relative">
      <input class="si" id="SI" type="text" placeholder="Material 번호 또는 Description (예: KB0781, Motor)" autocomplete="off" spellcheck="false">
      <div class="acd" id="ACD"></div>
    </div>
    <button class="sbtn" id="SBTN">&#128269; 검색</button>
  </div>
</div>
<div class="ct" id="CT"></div>
<div id="loading"><div class="spin"></div><p>GitHub에서 재고 데이터 로드 중...</p></div>
<div id="error"><div style="font-size:40px">⚠️</div><p id="err-msg" style="color:#dc2626;font-weight:600;font-size:15px;margin-top:8px"></p><p style="color:#64748b;font-size:13px;margin-top:4px">잠시 후 페이지를 새로고침 해주세요</p></div>
<script>
(async function() {
  // GitHub에서 XLSX fetch → SAP 파싱
  var ZBIN_URL = 'https://raw.githubusercontent.com/wjdwlals9545-arch/pbk-warehouse/main/public/data/Zbindata_latest.xlsx';
  var loadingEl = document.getElementById('loading');
  var errorEl   = document.getElementById('error');
  var errMsgEl  = document.getElementById('err-msg');
  loadingEl.style.display = 'flex';

  var INV;
  try {
    var res = await fetch(ZBIN_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status + ' — 파일을 불러올 수 없습니다');
    var buf = await res.arrayBuffer();
    var workbook = XLSX.read(buf);
    var sheet = workbook.Sheets[workbook.SheetNames[0]];
    var jsonData = XLSX.utils.sheet_to_json(sheet);

    var materialInfoMap = {};
    jsonData.forEach(function(row) {
      var material = row['Material'];
      var desc = row['Material Description'];
      var bin  = row['Storage Bin'];
      if (material && desc && String(desc).trim() && bin) {
        var matKey = String(material);
        if (String(bin).match(/^\d{10}/)) return;
        if (!materialInfoMap[matKey]) materialInfoMap[matKey] = { description: String(desc), bins: [] };
        materialInfoMap[matKey].bins.push(String(bin));
      }
    });

    INV = jsonData
      .filter(function(row) {
        var material = row['Material'];
        var desc = row['Material Description'];
        return material && (!desc || !String(desc).trim());
      })
      .map(function(row) {
        var material = String(row['Material'] || '');
        var info = materialInfoMap[material] || { description: '', bins: [] };
        var primaryBin = info.bins.length > 0 ? info.bins[0] : '';
        return { material: material, description: info.description, bin: primaryBin, stock: parseFloat(row['Available stock']) || 0 };
      })
      .filter(function(item) { return item.bin; });

    if (INV.length === 0) throw new Error('유효한 재고 데이터가 없습니다');

    var now = new Date();
    document.getElementById('hd-date').textContent =
      'PBK Warehouse · 업데이트: ' +
      now.toLocaleString('ko-KR', { month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  } catch(e) {
    loadingEl.style.display = 'none';
    errorEl.style.display = 'flex';
    errMsgEl.textContent = '데이터 로드 실패: ' + e.message;
    return;
  }
  loadingEl.style.display = 'none';
  var RMS = {"A5":"Maxwell 16","A6":"Maxwell 16","A7":"Maxwell 16","B2":"Maxwell 16","C1":"Maxwell 16","A1":"Maxwell 48","A2":"Maxwell 48","B1":"Maxwell 48","B3":"Maxwell 48","C3":"Maxwell 48","A3":"HSM 3.0","B4":"HSM 3.0","C2":"HSM 3.0"};
  var BLM = {"A1-01":{l:3,p:1},"A1-02":{l:3,p:2},"A1-03":{l:3,p:3},"A1-04":{l:3,p:1},"A1-05":{l:3,p:2},"A1-06":{l:3,p:3},"A2-01":{l:3,p:1},"A2-02":{l:3,p:2},"A2-03":{l:3,p:1},"A2-04":{l:3,p:2},"A2-05":{l:3,p:3},"A3-01":{l:4,p:1},"A3-02":{l:4,p:2},"A3-03":{l:4,p:3},"A3-04":{l:4,p:4},"A5-01":{l:3,p:1},"A5-02":{l:3,p:2},"A5-03":{l:3,p:3},"A5-04":{l:3,p:1},"A5-05":{l:3,p:2},"A5-06":{l:3,p:3},"A6-01":{l:3,p:1},"A6-02":{l:3,p:2},"A6-03":{l:3,p:3},"A6-04":{l:3,p:1},"A6-05":{l:3,p:2},"A6-06":{l:3,p:3},"A7-01":{l:2,p:1},"A7-02":{l:1,p:1},"B1-01":{l:5,p:1},"B1-02":{l:5,p:2},"B1-03":{l:5,p:3},"B1-04":{l:5,p:4},"B1-05":{l:5,p:5},"B1-06":{l:5,p:1},"B1-07":{l:5,p:2},"B1-08":{l:5,p:3},"B1-09":{l:5,p:4},"B1-10":{l:5,p:5},"B1-11":{l:1,p:1},"B1-12":{l:1,p:1},"B1-14":{l:1,p:1},"B2-01":{l:5,p:1},"B2-02":{l:5,p:2},"B2-03":{l:5,p:3},"B2-04":{l:5,p:4},"B2-05":{l:5,p:5},"B2-06":{l:5,p:1},"B2-07":{l:5,p:2},"B2-08":{l:5,p:3},"B2-09":{l:5,p:4},"B2-10":{l:5,p:5},"B2-11":{l:5,p:1},"B2-12":{l:5,p:2},"B2-13":{l:5,p:3},"B2-14":{l:5,p:4},"B2-15":{l:5,p:5},"B2-18":{l:1,p:1},"B3-01":{l:1,p:1},"B3-02":{l:1,p:1},"B3-03":{l:1,p:1},"B3-04":{l:1,p:1},"B3-05":{l:1,p:1},"B4-01":{l:5,p:1},"B4-02":{l:5,p:2},"B4-03":{l:5,p:3},"B4-04":{l:5,p:4},"B4-05":{l:6,p:1},"B4-06":{l:6,p:2},"B4-07":{l:6,p:3},"B4-08":{l:6,p:4},"B4-09":{l:6,p:5},"B4-10":{l:6,p:6},"B4-11":{l:2,p:1},"B4-12":{l:2,p:2},"B4-13":{l:2,p:1},"B4-14":{l:2,p:2},"B4-15":{l:2,p:1},"B4-16":{l:2,p:2},"B4-17":{l:1,p:1},"C1-01":{l:7,p:1},"C1-02":{l:7,p:2},"C1-03":{l:7,p:3},"C1-04":{l:7,p:4},"C1-05":{l:7,p:5},"C1-06":{l:7,p:6},"C1-07":{l:7,p:7},"C1-08":{l:7,p:1},"C1-09":{l:7,p:2},"C1-10":{l:7,p:3},"C1-11":{l:7,p:4},"C1-12":{l:7,p:5},"C1-13":{l:7,p:6},"C1-14":{l:7,p:7},"C2-01":{l:7,p:1},"C2-02":{l:7,p:2},"C2-03":{l:7,p:3},"C2-04":{l:7,p:4},"C2-05":{l:7,p:5},"C2-06":{l:7,p:6},"C2-07":{l:7,p:7},"C2-08":{l:7,p:1},"C2-09":{l:7,p:2},"C2-10":{l:7,p:3},"C2-11":{l:7,p:4},"C2-12":{l:7,p:5},"C2-13":{l:7,p:6},"C2-14":{l:7,p:7},"C2-15":{l:4,p:1},"C2-16":{l:4,p:2},"C2-17":{l:4,p:3},"C2-18":{l:4,p:4},"C2-19":{l:5,p:1},"C2-20":{l:5,p:2},"C2-21":{l:5,p:3},"C2-22":{l:5,p:4},"C2-23":{l:5,p:5},"C3-01":{l:7,p:1},"C3-02":{l:7,p:2},"C3-03":{l:7,p:3},"C3-04":{l:7,p:4},"C3-05":{l:7,p:5},"C3-06":{l:7,p:6},"C3-07":{l:7,p:7},"C3-08":{l:7,p:1},"C3-09":{l:7,p:2},"C3-10":{l:7,p:3},"C3-11":{l:7,p:4},"C3-12":{l:7,p:5},"C3-13":{l:7,p:6},"C3-14":{l:7,p:7},"C3-15":{l:6,p:1},"C3-16":{l:6,p:2},"C3-17":{l:6,p:3},"C3-18":{l:6,p:4},"C3-19":{l:6,p:5},"C3-20":{l:6,p:6},"C3-21":{l:5,p:1},"C3-22":{l:5,p:2},"C3-23":{l:5,p:3},"C3-24":{l:5,p:4},"C3-25":{l:5,p:5},"D2":{l:1,p:1},"E3":{l:1,p:1},"S1":{l:3,p:1}};
  var ABBOX_HC = {"A1":{x:14,y:56,w:40,h:19},"A2":{x:14,y:78,w:40,h:10},"A3":{x:51,y:32,w:20,h:20},"A5":{x:56,y:56,w:20,h:10},"A6":{x:56,y:69,w:20,h:10},"A7":{x:56,y:81,w:20,h:16},"B1":{x:12,y:101,w:42,h:17},"B2":{x:56,y:118,w:10,h:22},"B3":{x:12,y:122,w:40,h:22},"B4":{x:63,y:5,w:10,h:33},"C1":{x:56,y:148,w:21,h:10},"C2":{x:51,y:7,w:10,h:22},"C3":{x:12,y:174,w:21,h:22},"S1":{x:85,y:56,w:40,h:17},"E3":{x:87,y:105,w:21,h:10},"D2":{x:63,y:222,w:20,h:5},"F1":{x:145,y:8,w:10,h:5}};
  var ASR_HC = {"A1":"mx48","A2":"mx48","A3":"hsm","A5":"mx16","A6":"mx16","A7":"mx16","B1":"mx48","B2":"mx16","B3":"mx48","B4":"hsm","C1":"mx16","C2":"hsm","C3":"mx48","S1":"semi","E3":"etc","D2":"etc","F1":"spare"};
  var SHC = {"mx48":"#dc2626","mx16":"#2563eb","hsm":"#d97706","semi":"#eab308","spare":"#7c3aed","etc":"#06b6d4"};
  // ── pbk_layout_data → ABBOX/ASR 동적 로드 (fallback: 하드코딩) ─────────
  var ABBOX = ABBOX_HC, ASR = ASR_HC, _layoutLoaded = false;
  var _SERIES_NAMES = {mx48:"Maxwell 48",mx16:"Maxwell 16",hsm:"HSM 3.0",semi:"Semi",spare:"SP",etc:"기타"};
  try {
    var _lraw = localStorage.getItem('pbk_layout_data');
    if (_lraw) {
      var _ld = JSON.parse(_lraw);
      if (_ld && Array.isArray(_ld.R) && _ld.R.length > 0) {
        var _ab = {};
        _ld.R.forEach(function(r) {
          var a = r.a; if (!a || r.x == null) return;
          var x1=r.x, y1=r.y, x2=r.x+r.w, y2=r.y+r.h;
          if (!_ab[a]) { _ab[a]={x1:x1,y1:y1,x2:x2,y2:y2,s:r.s||'etc'}; }
          else {
            _ab[a].x1=Math.min(_ab[a].x1,x1); _ab[a].y1=Math.min(_ab[a].y1,y1);
            _ab[a].x2=Math.max(_ab[a].x2,x2); _ab[a].y2=Math.max(_ab[a].y2,y2);
          }
        });
        var _ax1=Infinity,_ay1=Infinity,_ax2=-Infinity,_ay2=-Infinity;
        Object.values(_ab).forEach(function(b){
          _ax1=Math.min(_ax1,b.x1); _ay1=Math.min(_ay1,b.y1);
          _ax2=Math.max(_ax2,b.x2); _ay2=Math.max(_ay2,b.y2);
        });
        if (_ax1<_ax2 && _ay1<_ay2) {
          var _mmX0=5,_mmY0=5,_mmW=150,_mmH=270;
          var _sx=_mmW/(_ax2-_ax1), _sy=_mmH/(_ay2-_ay1);
          var _nb={}, _na={};
          Object.keys(_ab).forEach(function(a) {
            var b=_ab[a];
            var mx=Math.round(_mmX0+(b.x1-_ax1)*_sx), my=Math.round(_mmY0+(b.y1-_ay1)*_sy);
            var mw=Math.max(Math.round((b.x2-b.x1)*_sx),5), mh=Math.max(Math.round((b.y2-b.y1)*_sy),5);
            _nb[a]={x:mx,y:my,w:mw,h:mh}; _na[a]=b.s;
          });
          ABBOX=_nb; ASR=_na; _layoutLoaded=true;
          // RMS도 업데이트 (시리즈 표시명)
          Object.keys(_na).forEach(function(a){ RMS[a]=_SERIES_NAMES[_na[a]]||'기타'; });
        }
      }
    }
  } catch(e) {}
  var cq = "";
  var inp = document.getElementById("SI");
  var acd = document.getElementById("ACD");
  var ct = document.getElementById("CT");

  function e(s) { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

  function showHome() {
    ct.innerHTML = '<div class="eb"><div style="font-size:44px;margin-bottom:10px">&#128230;</div>'
      + '<p>Material 번호를 입력하면<br>창고 보관 위치를 안내합니다</p>'
      + '<small style="color:#94a3b8;font-size:12px">Material 번호 또는 Description으로 검색 가능</small>'
      + '<div class="hc" id="HC"></div></div>';
    var hc = document.getElementById("HC");
    ["710335","KB0781","Motor","Heater"].forEach(function(v) {
      var btn = document.createElement("span");
      btn.className = "hchip";
      btn.textContent = v;
      btn.addEventListener("click", function() { inp.value = v; doSearch(); });
      hc.appendChild(btn);
    });
  }

  function showAC(q) {
    var uq = q.toUpperCase();
    var hits = INV.filter(function(i){ return (i.material||"").toUpperCase().indexOf(uq)>=0||(i.description||"").toUpperCase().indexOf(uq)>=0; });
    var seen = {}, uniq = [];
    hits.forEach(function(i){ if(!seen[i.material]){seen[i.material]=1;uniq.push(i);} });
    uniq = uniq.slice(0,7);
    if(!uniq.length){ acd.style.display="none"; return; }
    acd.innerHTML = "";
    uniq.forEach(function(s) {
      var div = document.createElement("div");
      div.className = "ai";
      div.innerHTML = '<span class="am">'+e(s.material)+'</span><span class="ad">'+e(s.description)+'</span><span class="ab">'+e(s.bin)+'</span>';
      div.addEventListener("click", function(){ inp.value = s.material; acd.style.display="none"; doSearch(); });
      acd.appendChild(div);
    });
    acd.style.display = "block";
  }

  function doSearch() {
    var q = inp.value.trim();
    if(!q) return;
    cq = q;
    acd.style.display = "none";
    renderResults(q);
  }

  function renderResults(q) {
    var uq = q.toUpperCase();
    var matches = INV.filter(function(i){ return (i.material||"").toUpperCase().indexOf(uq)>=0||(i.description||"").toUpperCase().indexOf(uq)>=0; });
    if(!matches.length){
      ct.innerHTML = '<div class="bk" id="BK">&#8592; 다시 검색</div><div class="eb"><div style="font-size:44px">&#128269;</div><p>"'+e(q)+'" 검색 결과가 없습니다</p></div>';
      document.getElementById("BK").addEventListener("click", function(){ cq=""; inp.value=""; showHome(); });
      return;
    }
    var bins = {};
    matches.forEach(function(i){ var b=i.bin||"?"; if(!bins[b])bins[b]=[]; bins[b].push(i); });
    var results = Object.keys(bins).sort().map(function(bin){
      var items=bins[bin], area=(bin.split("-")[0])||bin, series=RMS[area]||"기타", blm=BLM[bin]||{l:3,p:1};
      return {bin:bin,area:area,series:series,levels:blm.l,rp:blm.p,items:items,tot:items.reduce(function(s,i){return s+(i.stock||0);},0)};
    });
    var tot = matches.reduce(function(s,i){return s+(i.stock||0);},0);
    var html = '<div class="bk" id="BK">&#8592; 다시 검색</div>'
      + '<div class="sb2"><span class="stag" style="background:#eef2ff;color:#4f46e5">검색: <b>'+e(q)+'</b></span>'
      + '<span class="stag" style="background:#f0fdf4;color:#16a34a">'+matches.length+'개 품목</span>'
      + '<span class="stag" style="background:#faf5ff;color:#7c3aed">'+Object.keys(bins).length+'개 Bin</span>'
      + '<span class="stag" style="background:#fffbeb;color:#b45309">총 '+tot.toLocaleString()+' EA</span></div>';
    results.forEach(function(loc,idx){
      var bc = loc.series==="Maxwell 48"?"b48":loc.series==="Maxwell 16"?"b16":loc.series==="HSM 3.0"?"bh":"be";
      html += '<div class="card"><div class="ch">'
        + '<div style="display:flex;align-items:center;gap:8px"><span class="bdg '+bc+'">'+e(loc.series)+'</span>'
        + '<span class="ct2">&#128205; '+e(loc.bin)+'<span class="cs">'+loc.levels+'단 랙</span></span></div>'
        + '<span class="ccnt">'+loc.items.length+'품목 &middot; '+loc.tot.toLocaleString()+' EA</span></div>'
        + '<div class="cb"><div class="rr">'+mkSVG(loc.levels,loc.rp)
        + '<div class="ic">'+loc.items.slice(0,4).map(function(i){
            return '<div class="ip"><span class="im">'+e(i.material)+'</span><span class="id2">'+e(i.description)+'</span><span class="iq">'+(i.stock||0).toLocaleString()+' EA</span></div>';
          }).join("")+(loc.items.length>4?'<span class="mt">외 '+(loc.items.length-4)+'개</span>':"")+
          '</div><div class="mc"><canvas id="mm'+idx+'" width="160" height="280" style="border-radius:8px;border:1px solid #334155;max-width:100%"></canvas>'
        + '<small style="font-size:10px;color:#94a3b8;margin-top:2px">'+e(loc.area)+' 영역</small></div></div></div></div>';
    });
    if(matches.length>4){
      html += '<div class="card"><div class="ch"><span style="font-weight:700;font-size:13px">&#128203; 전체 '+matches.length+'건</span></div>'
        + '<div class="tw"><table><thead><tr><th>Material</th><th>Description</th><th>Bin</th><th style="text-align:right">재고</th></tr></thead><tbody>'
        + matches.map(function(i){return'<tr><td style="font-family:monospace;font-weight:700">'+e(i.material)+'</td><td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+e(i.description)+'</td><td style="font-weight:600">'+e(i.bin)+'</td><td style="text-align:right;font-weight:600;color:#4f46e5">'+(i.stock||0).toLocaleString()+'</td></tr>';}).join("")
        + '</tbody></table></div></div>';
    }
    ct.innerHTML = html;
    document.getElementById("BK").addEventListener("click", function(){ cq=""; inp.value=""; showHome(); });
    results.forEach(function(loc,idx){ drawMap("mm"+idx, loc.area); });
  }

  function mkSVG(lvls,hl) {
    var sh=44,pd=8,pw=8,W=150,H=lvls*sh+pd*2+10;
    var s = '<svg width="'+W+'" height="'+H+'" style="flex-shrink:0;border-radius:8px">'
      + '<rect width="'+W+'" height="'+H+'" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>'
      + '<rect x="4" y="'+(H-7)+'" width="'+(W-8)+'" height="6" rx="2" fill="#64748b"/>'
      + '<rect x="4" y="'+(pd-2)+'" width="'+pw+'" height="'+(H-pd-5)+'" rx="2" fill="#64748b"/>'
      + '<rect x="'+(W-pw-4)+'" y="'+(pd-2)+'" width="'+pw+'" height="'+(H-pd-5)+'" rx="2" fill="#64748b"/>';
    for(var i=0;i<lvls;i++){
      var lv=i+1, h2=(lv===hl), y=pd+i*sh, sy=y+sh-6, cx=pw+7, cw=W-pw*2-14;
      if(h2) s += '<rect x="'+(cx-1)+'" y="'+(y+2)+'" width="'+(cw+2)+'" height="'+(sh-5)+'" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>';
      s += '<text x="'+(cx+3)+'" y="'+(y+sh/2+1)+'" fill="'+(h2?"#92400e":"#94a3b8")+'" font-size="'+(h2?13:11)+'" font-weight="'+(h2?"bold":"normal")+'" dominant-baseline="middle">'+lv+'단</text>';
      if(h2){ for(var b=0;b<3;b++){ var bx=cx+cw-(3-b)*29, by=y+6; s+='<rect x="'+bx+'" y="'+by+'" width="26" height="'+(sh-16)+'" rx="2.5" fill="#fbbf24" stroke="#d97706" stroke-width="0.8"/>'; } }
      else s += '<line x1="'+(cx+28)+'" y1="'+(y+sh/2)+'" x2="'+(cx+cw-4)+'" y2="'+(y+sh/2)+'" stroke="#e2e8f0" stroke-dasharray="4,3"/>';
      s += '<rect x="4" y="'+sy+'" width="'+(W-8)+'" height="6" rx="1" fill="'+(h2?"#b45309":"#94a3b8")+'"/>';
    }
    return s + '</svg>';
  }

  function drawMap(cid, area) {
    var cv = document.getElementById(cid);
    if(!cv) return;
    var ctx = cv.getContext("2d"), W=cv.width, H=cv.height;
    ctx.clearRect(0,0,W,H); ctx.fillStyle="#0f172a"; ctx.fillRect(0,0,W,H);
    if (_layoutLoaded) {
      ctx.fillStyle="#1e293b"; ctx.fillRect(3,3,W-6,H-6);
      ctx.strokeStyle="#475569"; ctx.lineWidth=1; ctx.strokeRect(3,3,W-6,H-6);
    } else {
      ctx.beginPath(); ctx.moveTo(8,8); ctx.lineTo(86,8); ctx.lineTo(86,115); ctx.lineTo(134,115); ctx.lineTo(134,260); ctx.lineTo(8,260); ctx.closePath();
      ctx.fillStyle="#1e293b"; ctx.fill(); ctx.strokeStyle="#475569"; ctx.lineWidth=1; ctx.stroke();
    }
    Object.keys(ABBOX).forEach(function(a){
      var r=ABBOX[a], isT=(a===area);
      ctx.globalAlpha = isT?0.95:0.4;
      ctx.fillStyle = SHC[ASR[a]]||"#64748b";
      ctx.fillRect(r.x,r.y,r.w,r.h);
      ctx.globalAlpha = 1;
      ctx.fillStyle = isT?"#fff":"#94a3b8";
      ctx.font = (isT?"bold 7px":"7px") + " sans-serif";
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(a, r.x+r.w/2, r.y+r.h/2);
    });
    var bb = ABBOX[area];
    if(bb){
      ctx.strokeStyle="#fbbf24"; ctx.lineWidth=2; ctx.setLineDash([4,2]);
      ctx.strokeRect(bb.x-2,bb.y-2,bb.w+4,bb.h+4); ctx.setLineDash([]);
      ctx.fillStyle="#fbbf24"; ctx.font="bold 8px sans-serif";
      ctx.textAlign="center"; ctx.textBaseline="bottom";
      ctx.fillText(area, bb.x+bb.w/2, Math.max(bb.y-3,11));
    }
  }

  inp.addEventListener("input", function(){
    var v = this.value.trim();
    cq = "";  // 타이핑하면 이전 검색 초기화
    if(!v||v.length<2){ acd.style.display="none"; return; }
    showAC(v);
  });
  inp.addEventListener("keydown", function(ev){
    if(ev.key==="Enter"){ acd.style.display="none"; doSearch(); }
    if(ev.key==="Escape") acd.style.display="none";
  });
  document.getElementById("SBTN").addEventListener("click", doSearch);
  document.addEventListener("click", function(ev){ if(!ev.target.closest(".sw")) acd.style.display="none"; });

  var p = new URLSearchParams(location.search);
  var m = p.get("m")||p.get("material");
  if(m){ inp.value=m; setTimeout(doSearch,100); }
  else { showHome(); }
})();
</script>
</body>
</html>
