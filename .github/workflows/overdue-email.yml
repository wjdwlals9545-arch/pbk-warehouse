name: Overdue Delivery Review Email

on:
  repository_dispatch:
    types: [send-overdue-email]

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Build Email HTML File
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const payload = context.payload.client_payload;
            const items = payload.items || [];
            const today = payload.date || new Date().toISOString().split('T')[0];

            let html = `<div style="font-family:'Malgun Gothic',Arial,sans-serif;max-width:800px;margin:0 auto;">`;
            html += `<p>안녕하세요, 정지민입니다.</p>`;
            html += `<p>아래 PO 건에 대해 납기 지연이 확인되어 검토 요청드립니다.<br/>Order close 또는 납품 예정 여부 확인 부탁드립니다.</p>`;
            html += `<br/><p style="font-size:14px;"><b>📋 납기 지연 리스트 - ${today} (${items.length}건)</b></p>`;
            html += `<table border="1" cellpadding="8" cellspacing="0" style="border-collapse:collapse;font-size:13px;width:100%;">`;
            html += `<tr style="background:#f3f4f6;">`;
            html += `<th style="border:1px solid #e5e7eb;padding:8px;">No</th>`;
            html += `<th style="border:1px solid #e5e7eb;padding:8px;">PO</th>`;
            html += `<th style="border:1px solid #e5e7eb;padding:8px;">Material</th>`;
            html += `<th style="border:1px solid #e5e7eb;padding:8px;">Description</th>`;
            html += `<th style="border:1px solid #e5e7eb;padding:8px;">공급업체</th>`;
            html += `<th style="border:1px solid #e5e7eb;padding:8px;">납기일</th>`;
            html += `<th style="border:1px solid #e5e7eb;padding:8px;">미입고</th>`;
            html += `<th style="border:1px solid #e5e7eb;padding:8px;">현재재고</th>`;
            html += `</tr>`;

            items.forEach((d, idx) => {
              html += `<tr>`;
              html += `<td style="border:1px solid #e5e7eb;padding:8px;text-align:center;">${idx+1}</td>`;
              html += `<td style="border:1px solid #e5e7eb;padding:8px;">${d.poNo || ''}</td>`;
              html += `<td style="border:1px solid #e5e7eb;padding:8px;font-weight:bold;">${d.material || ''}</td>`;
              html += `<td style="border:1px solid #e5e7eb;padding:8px;">${d.description || ''}</td>`;
              html += `<td style="border:1px solid #e5e7eb;padding:8px;">${d.supplier || ''}</td>`;
              html += `<td style="border:1px solid #e5e7eb;padding:8px;color:#dc2626;font-weight:bold;">${d.deliveryDate || ''}</td>`;
              html += `<td style="border:1px solid #e5e7eb;padding:8px;text-align:right;font-weight:bold;">${d.qty || 0} ${d.unit || 'EA'}</td>`;
              html += `<td style="border:1px solid #e5e7eb;padding:8px;text-align:right;">${(d.stock || 0) > 0 ? d.stock + ' EA' : '-'}</td>`;
              html += `</tr>`;
            });

            html += `</table>`;
            html += `<br/><p>검토 후 회신 부탁드립니다.<br/>감사합니다.</p>`;
            html += `<br/><p style="color:#999;font-size:11px;">---<br/>자동 생성 by PBK Warehouse Dashboard</p></div>`;

            // HTML을 파일로 저장
            fs.writeFileSync('email_body.html', html);
            console.log(`Email HTML written (${html.length} chars), items: ${items.length}`);

            // 메타데이터를 환경변수로
            const subject = payload.subject || `[납기 지연 검토 요청] ${items.length}건 (${today})`;
            const toEmail = payload.to_email || 'jimin.jung@promega.com';
            const ccEmail = payload.cc_email || '';
            fs.appendFileSync(process.env.GITHUB_ENV, `EMAIL_SUBJECT=${subject}\n`);
            fs.appendFileSync(process.env.GITHUB_ENV, `EMAIL_TO=${toEmail}\n`);
            fs.appendFileSync(process.env.GITHUB_ENV, `EMAIL_CC=${ccEmail}\n`);

      - name: Send Email via Gmail SMTP
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: ${{ env.EMAIL_SUBJECT }}
          html_body: file://email_body.html
          from: PBK Warehouse <pbkwarehouse1@gmail.com>
          to: jiwon.hwang@promega.com
          cc: jimin.jung@promega.com
