name: Q-Stock Inspection Alert

on:
  push:
    branches: [main]
    paths:
      - 'public/data/qstock_data.json'

jobs:
  check-qstock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Q-Stock Ages and Create Alert
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let data;
            try {
              data = JSON.parse(fs.readFileSync('public/data/qstock_data.json', 'utf8'));
            } catch (e) {
              console.log('No qstock_data.json found or invalid JSON');
              return;
            }

            const items = data.data || [];
            if (items.length === 0) {
              console.log('No Q-stock items found.');
              return;
            }

            const now = new Date();
            const warnings = [];  // 7-10 days
            const urgents = [];   // > 10 days

            items.forEach(item => {
              if (!item.grDate) return;
              const grDate = new Date(item.grDate);
              if (isNaN(grDate.getTime())) return;
              const days = Math.floor((now - grDate) / (1000 * 60 * 60 * 24));
              if (days > 10) urgents.push({ ...item, days });
              else if (days >= 7) warnings.push({ ...item, days });
            });

            if (urgents.length === 0 && warnings.length === 0) {
              console.log('No overdue Q-stock items. All items within 7-day threshold.');
              return;
            }

            // Build issue body
            let body = `## 🔍 Q-Stock 수입검사 지연 알림\n\n`;
            body += `**검사일:** ${now.toISOString().split('T')[0]}\n`;
            body += `**총 Q-Stock:** ${items.length}건\n\n`;

            if (urgents.length > 0) {
              body += `### 🚨 긴급 (10일 초과) - ${urgents.length}건\n\n`;
              body += `| 자재코드 | 품명 | 위치 | 수량 | 입고일 | 경과일 |\n`;
              body += `|---------|------|------|------|--------|--------|\n`;
              urgents.forEach(i => {
                body += `| **${i.material}** | ${i.description || '-'} | ${i.bin || '-'} | ${i.stock} ${i.unit} | ${i.grDate} | **${i.days}일** |\n`;
              });
              body += '\n';
            }

            if (warnings.length > 0) {
              body += `### ⚠️ 주의 (7~10일) - ${warnings.length}건\n\n`;
              body += `| 자재코드 | 품명 | 위치 | 수량 | 입고일 | 경과일 |\n`;
              body += `|---------|------|------|------|--------|--------|\n`;
              warnings.forEach(i => {
                body += `| ${i.material} | ${i.description || '-'} | ${i.bin || '-'} | ${i.stock} ${i.unit} | ${i.grDate} | ${i.days}일 |\n`;
              });
              body += '\n';
            }

            body += `\n---\n*자동 생성 by PBK Warehouse Dashboard*`;

            const title = `[Q-Stock Alert] ${urgents.length > 0 ? '🚨' : '⚠️'} ${urgents.length}건 긴급, ${warnings.length}건 주의 (${now.toISOString().split('T')[0]})`;

            // Check for existing open issue with same date to avoid duplicates
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'q-stock-alert',
              state: 'open',
              per_page: 5
            });

            const todayStr = now.toISOString().split('T')[0];
            const duplicateIssue = existingIssues.data.find(issue =>
              issue.title.includes(todayStr)
            );

            if (duplicateIssue) {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicateIssue.number,
                body: body
              });
              console.log(`Updated existing issue #${duplicateIssue.number}`);
            } else {
              // Create new issue
              try {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: title,
                  body: body,
                  labels: ['q-stock-alert']
                });
                console.log('Created new Q-Stock alert issue');
              } catch (e) {
                // Label might not exist, create without label
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: title,
                  body: body
                });
                console.log('Created new Q-Stock alert issue (without label)');
              }
            }
