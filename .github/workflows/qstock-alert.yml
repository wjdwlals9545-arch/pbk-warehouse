name: Q-Stock Inspection Alert

on:
  schedule:
    # 평일(월~금) 오전 9시 KST (UTC 00:00 당일) — 주말 제외
    - cron: '0 0 * * 1-5'
  push:
    branches: [main]
    paths:
      - 'public/data/qstock_data.json'
  workflow_dispatch:
    inputs:
      test_mode:
        description: '테스트 모드 (jimin.jung에게만 발송, 경과일 제한 없이 전체 리스트)'
        required: false
        type: boolean
        default: true

jobs:
  check-qstock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if weekday (skip weekends for push trigger)
        id: weekday_check
        run: |
          DAY=$(date -u +%u)
          EVENT="${{ github.event_name }}"
          echo "Day of week (1=Mon,7=Sun): $DAY, Event: $EVENT"
          if [ "$DAY" -ge 6 ] && [ "$EVENT" = "push" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Weekend + push trigger → skipping email"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Proceeding with email check"
          fi

      - name: Check Q-Stock Ages and Send Alert
        if: steps.weekday_check.outputs.skip != 'true'
        uses: actions/github-script@v7
        id: check
        with:
          script: |
            const fs = require('fs');
            const isTest = '${{ github.event.inputs.test_mode }}' === 'true';

            let data;
            try {
              data = JSON.parse(fs.readFileSync('public/data/qstock_data.json', 'utf8'));
            } catch (e) {
              console.log('No qstock_data.json found or invalid JSON');
              return;
            }

            const items = data.data || [];
            if (items.length === 0) {
              console.log('No Q-stock items found.');
              return;
            }

            const now = new Date();
            const warnings = [];  // 7-10 days (or all items in test mode)
            const urgents = [];   // > 10 days

            items.forEach(item => {
              if (!item.grDate) return;
              // F1, S1 위치 제외
              const bin = (item.bin || '').trim().toUpperCase();
              if (bin.startsWith('F1') || bin.startsWith('S1')) return;
              const grDate = new Date(item.grDate);
              if (isNaN(grDate.getTime())) return;
              const days = Math.floor((now - grDate) / (1000 * 60 * 60 * 24));

              if (isTest) {
                // 테스트 모드: 모든 항목 포함
                if (days > 10) urgents.push({ ...item, days });
                else if (days >= 7) warnings.push({ ...item, days });
                else warnings.push({ ...item, days }); // 테스트에서는 7일 미만도 포함
              } else {
                if (days > 10) urgents.push({ ...item, days });
                else if (days >= 8) warnings.push({ ...item, days });
              }
            });

            if (urgents.length === 0 && warnings.length === 0) {
              console.log('No Q-stock items to alert.');
              core.setOutput('should_send', 'false');
              return;
            }

            // 긴급도 순 정렬 (경과일 내림차순)
            const allAlerts = [...urgents, ...warnings].sort((a, b) => b.days - a.days);

            // Build HTML email body
            const testLabel = isTest ? ' [테스트]' : '';
            let htmlBody = `<div style="font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 800px; margin: 0 auto;">`;
            htmlBody += `<p>안녕하세요, 정지민입니다.</p>`;
            htmlBody += `<p>수입검사 대기 리스트 공유드립니다.</p>`;
            htmlBody += `<p>리스트 참고하여 수입검사 부탁드립니다.</p>`;
            htmlBody += `<br/>`;
            if (isTest) htmlBody += `<p style="color: #e53e3e; font-weight: bold;">⚠️ 이 메일은 테스트 발송입니다.</p>`;
            htmlBody += `<p style="color: #666; font-size: 13px;">검사일: ${now.toISOString().split('T')[0]} | 총 알림: ${allAlerts.length}건 (긴급 ${urgents.length}건, 주의 ${warnings.length}건)</p>`;
            htmlBody += `<table style="width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px;">`;
            htmlBody += `<thead><tr style="background: #f3f4f6;">`;
            htmlBody += `<th style="border: 1px solid #e5e7eb; padding: 8px; text-align: center;">상태</th>`;
            htmlBody += `<th style="border: 1px solid #e5e7eb; padding: 8px; text-align: left;">자재코드</th>`;
            htmlBody += `<th style="border: 1px solid #e5e7eb; padding: 8px; text-align: left;">품명</th>`;
            htmlBody += `<th style="border: 1px solid #e5e7eb; padding: 8px; text-align: left;">위치</th>`;
            htmlBody += `<th style="border: 1px solid #e5e7eb; padding: 8px; text-align: right;">수량</th>`;
            htmlBody += `<th style="border: 1px solid #e5e7eb; padding: 8px; text-align: center;">입고일</th>`;
            htmlBody += `<th style="border: 1px solid #e5e7eb; padding: 8px; text-align: center;">경과일</th>`;
            htmlBody += `</tr></thead><tbody>`;

            allAlerts.forEach(item => {
              const isUrgent = item.days > 10;
              const isWarning = item.days >= 7 && item.days <= 10;
              const bgColor = isUrgent ? '#fef2f2' : isWarning ? '#fffbeb' : '#f0fdf4';
              const statusEmoji = isUrgent ? '🚨 긴급' : isWarning ? '⚠️ 주의' : '✅ 정상';
              const daysColor = isUrgent ? '#dc2626' : isWarning ? '#d97706' : '#16a34a';
              htmlBody += `<tr style="background: ${bgColor};">`;
              htmlBody += `<td style="border: 1px solid #e5e7eb; padding: 8px; text-align: center;">${statusEmoji}</td>`;
              htmlBody += `<td style="border: 1px solid #e5e7eb; padding: 8px; font-weight: bold;">${item.material}</td>`;
              htmlBody += `<td style="border: 1px solid #e5e7eb; padding: 8px;">${item.description || '-'}</td>`;
              htmlBody += `<td style="border: 1px solid #e5e7eb; padding: 8px;">${item.bin || '-'}</td>`;
              htmlBody += `<td style="border: 1px solid #e5e7eb; padding: 8px; text-align: right;">${item.stock} ${item.unit}</td>`;
              htmlBody += `<td style="border: 1px solid #e5e7eb; padding: 8px; text-align: center;">${item.grDate}</td>`;
              htmlBody += `<td style="border: 1px solid #e5e7eb; padding: 8px; text-align: center; color: ${daysColor}; font-weight: bold;">${item.days}일</td>`;
              htmlBody += `</tr>`;
            });

            htmlBody += `</tbody></table>`;
            htmlBody += `<br/><p style="color: #999; font-size: 11px;">---<br/>자동 생성 by PBK Warehouse Dashboard</p>`;
            htmlBody += `</div>`;

            // HTML을 파일로 저장 (output 크기 제한 회피)
            fs.writeFileSync('qstock_email.html', htmlBody);
            console.log(`Email HTML written (${htmlBody.length} chars)`);

            core.setOutput('should_send', 'true');
            core.setOutput('urgent_count', urgents.length.toString());
            core.setOutput('warning_count', warnings.length.toString());
            core.setOutput('date_str', now.toISOString().split('T')[0]);
            core.setOutput('is_test', isTest ? 'true' : 'false');

            // GitHub Issue 생성 (실패해도 메일 발송에 영향 없도록 try-catch)
            if (!isTest) {
              try {
                let issueBody = `## 🔍 Q-Stock 수입검사 지연 알림\n\n`;
                issueBody += `**검사일:** ${now.toISOString().split('T')[0]}\n`;
                issueBody += `**총 알림:** ${allAlerts.length}건\n\n`;
                if (urgents.length > 0) {
                  issueBody += `### 🚨 긴급 (10일 초과) - ${urgents.length}건\n\n`;
                  issueBody += `| 자재코드 | 품명 | 위치 | 수량 | 입고일 | 경과일 |\n|---------|------|------|------|--------|--------|\n`;
                  urgents.forEach(i => { issueBody += `| **${i.material}** | ${i.description || '-'} | ${i.bin || '-'} | ${i.stock} ${i.unit} | ${i.grDate} | **${i.days}일** |\n`; });
                }
                if (warnings.length > 0) {
                  issueBody += `### ⚠️ 주의 (7~10일) - ${warnings.length}건\n\n`;
                  issueBody += `| 자재코드 | 품명 | 위치 | 수량 | 입고일 | 경과일 |\n|---------|------|------|------|--------|--------|\n`;
                  warnings.forEach(i => { issueBody += `| ${i.material} | ${i.description || '-'} | ${i.bin || '-'} | ${i.stock} ${i.unit} | ${i.grDate} | ${i.days}일 |\n`; });
                }
                issueBody += `\n---\n*자동 생성 by PBK Warehouse Dashboard*`;
                const title = `[Q-Stock Alert] ${urgents.length > 0 ? '🚨' : '⚠️'} ${urgents.length}건 긴급, ${warnings.length}건 주의 (${now.toISOString().split('T')[0]})`;
                const existingIssues = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, labels: 'q-stock-alert', state: 'open', per_page: 5 });
                const todayStr2 = now.toISOString().split('T')[0];
                const dup = existingIssues.data.find(issue => issue.title.includes(todayStr2));
                if (dup) {
                  await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: dup.number, body: issueBody });
                } else {
                  await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body: issueBody, labels: ['q-stock-alert'] }).catch(() =>
                    github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body: issueBody })
                  );
                }
                console.log('GitHub Issue created/updated');
              } catch (issueErr) {
                console.log('GitHub Issue failed (non-critical):', issueErr.message);
                // Issue 실패해도 메일은 발송되어야 함
              }
            } else {
              console.log('Test mode - skipping GitHub Issue');
            }

      - name: Build Email Subject
        if: steps.check.outputs.should_send == 'true' && steps.weekday_check.outputs.skip != 'true'
        id: subject
        run: |
          IS_TEST="${{ steps.check.outputs.is_test }}"
          URGENT="${{ steps.check.outputs.urgent_count }}"
          WARNING="${{ steps.check.outputs.warning_count }}"
          DATE_STR="${{ steps.check.outputs.date_str }}"
          if [ "$IS_TEST" = "true" ]; then
            echo "value=[테스트] [수입검사 알림] 긴급 ${URGENT}건, 주의 ${WARNING}건 (${DATE_STR})" >> $GITHUB_OUTPUT
          else
            echo "value=[수입검사 알림] 긴급 ${URGENT}건, 주의 ${WARNING}건 (${DATE_STR})" >> $GITHUB_OUTPUT
          fi

      - name: Send Email Alert via Gmail SMTP
        if: steps.check.outputs.should_send == 'true' && steps.weekday_check.outputs.skip != 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: ${{ steps.subject.outputs.value }}
          html_body: file://qstock_email.html
          from: PBK Warehouse <pbkwarehouse1@gmail.com>
          to: ${{ steps.check.outputs.is_test == 'true' && 'wjdwlals9545@gmail.com' || 'heejae.kim@promega.com,changyeol.yoo@promega.com' }}
          cc: ${{ steps.check.outputs.is_test == 'true' && '' || 'jimin.jung@promega.com,kwangsub.ahn@promega.com' }}
